name: spike-runtime-probe

# Cheap foundational spike: build a tiny arm64 iOS Mach-O that tests exec / JIT / fork
# under Dopamine. Everything else (the Node build, the .deb) is worthless if this fails.

on:
  workflow_dispatch:
  push:
    paths:
      - "spikes/runtime-probe/**"
      - ".github/workflows/spike-runtime-probe.yml"

permissions:
  contents: write

jobs:
  build-probe:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version || true
          echo "iphoneos SDK: $(xcrun --sdk iphoneos --show-sdk-path)"
          echo "iphoneos SDK version: $(xcrun --sdk iphoneos --show-sdk-version)"
          xcrun --sdk iphoneos clang --version

      - name: Compile probe (arm64, iphoneos, min iOS 15)
        working-directory: spikes/runtime-probe
        run: |
          set -euxo pipefail
          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=15.0 \
            -O0 -Wall \
            -o probe probe.c
          file probe
          # Show the load command platform so we can confirm it's an iOS (not macOS) binary
          otool -l probe | grep -A4 -E "LC_BUILD_VERSION|LC_VERSION_MIN_IPHONEOS" || true
          # Ad-hoc sign in CI too (codesign) as a baseline; the device will re-sign with ldid + ents.
          codesign -f -s - probe || true

      # Publish to a Release instead of an artifact: release storage is separate from
      # the Actions artifact quota (which is exhausted on this account) and is how the
      # final .deb will ship anyway.
      - name: Publish probe to release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: spikes/runtime-probe
        run: |
          set -euxo pipefail
          gh release view spike-probe -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create spike-probe -R "$GITHUB_REPOSITORY" \
                 --title "spike: runtime probe" \
                 --notes "arm64 iOS runtime probe (exec/JIT/fork)" --prerelease
          gh release upload spike-probe probe ents.plist --clobber -R "$GITHUB_REPOSITORY"
